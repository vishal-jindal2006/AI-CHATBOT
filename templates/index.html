<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>AI Chatbot</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

    <!-- MOBILE MENU BUTTON -->

    <button class="menu-toggle" onclick="toggleSidebar()">
        ☰
    </button>

    <div class="app">

        <!-- SIDEBAR -->

        <div class="sidebar" id="sidebar">

            <h2>
                🤖 AI Chatbot
            </h2>

            <div class="sidebar-menu">

                <p>✔ Smart Responses</p>

                <p>✔ Fast Replies</p>

                <p>✔ Modern UI</p>

                <p>✔ AI Logic</p>

                <p>✔ Responsive Design</p>

            </div>

            <!-- ABOUT BUTTON -->

            <a href="/about">

                <button class="about-btn">
                    About Page
                </button>

            </a>

            <!-- CLEAR CHAT BUTTON -->

            <button class="clear-btn" onclick="clearChat()">
                Clear Chat
            </button>

            <!-- FOOTER -->

            <div class="footer">
                Created by Vishal Jindal
            </div>

        </div>

        <!-- MAIN CONTENT -->

        <div class="main-content">

            <h1 class="hero-title">
                Professional AI Chatbot
            </h1>

            <!-- CHAT BOX -->

            <div class="chat-box" id="chat-box">

                <div class="bot-message">
                    Hello 👋 Welcome to AI Chatbot
                </div>

            </div>

            <!-- CHAT INPUT -->

            <div class="chat-input-area">

                <input
                    type="text"
                    id="user-input"
                    placeholder="Type your message..."
                >

                <button onclick="sendMessage()">
                    Send
                </button>

            </div>

            <!-- CONTACT SECTION -->

            <h2 class="contact-title">
                Contact Us
            </h2>

            <form
                class="contact-form"
                action="/contact"
                method="POST"
            >

                <input
                    type="text"
                    name="name"
                    placeholder="Your Name"
                    required
                >

                <input
                    type="email"
                    name="email"
                    placeholder="Your Email"
                    required
                >

                <textarea
                    name="message"
                    placeholder="Your Message"
                    required
                ></textarea>

                <button type="submit">
                    Submit
                </button>

            </form>

        </div>

    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>

</body>

</html>
